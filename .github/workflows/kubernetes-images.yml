name: kubernetes-images

on:
  push:
    branches: [main]
    paths:
      - "kubernetes/**"
      - "core/**"
      - ".github/workflows/kubernetes-images.yml"
  pull_request:
    paths:
      - "kubernetes/**"
      - "core/**"
      - ".github/workflows/kubernetes-images.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # The whole API lives in core/; it picks the Kubernetes backend at
          # runtime via LAB_PLATFORM (baked into Dockerfile.kubernetes).
          - name: api
            context: core
            file: core/Dockerfile.kubernetes
          - name: bootstrap
            context: kubernetes/bootstrap
            file: kubernetes/bootstrap/Dockerfile
          - name: student
            context: kubernetes/student-image
            file: kubernetes/student-image/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Pull requests (including from forks) don't get write access to
      # packages, so only log in and push on a direct push to main; PRs still
      # get a real build to confirm the Dockerfiles work.
      - if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository_owner }}/lab-platform-${{ matrix.name }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
