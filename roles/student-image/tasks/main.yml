---

- name: Create student image build directory on VM
  ansible.builtin.file:
    path: /opt/student-image
    state: directory
    mode: '0755'

- name: Copy student image Dockerfile to VM
  ansible.builtin.copy:
    src: Dockerfile
    dest: /opt/student-image/Dockerfile
    mode: '0644'
  register: dockerfile_copy

- name: Build student Docker image
  community.docker.docker_image:
    name: student-image
    tag: latest
    source: build
    build:
      path: /opt/student-image
      pull: false      
    state: present
    force_source: "{{ dockerfile_copy.changed }}"
