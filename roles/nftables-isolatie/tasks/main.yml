---
- name: Deploy lab isolation nftables rules
  ansible.builtin.template:
    src: nftables-lab-isolation.conf.j2
    dest: /etc/nftables-lab-isolation.conf
    mode: '0640'
    validate: 'nft -c -f %s'  
  notify: apply nftables rules

- name: Include lab isolation rules from main nftables config
  ansible.builtin.lineinfile:
    path: /etc/nftables.conf
    line: 'include "/etc/nftables-lab-isolation.conf"'
    create: true
    mode: '0640'

- name: Apply isolation rules immediately
  ansible.builtin.command: nft -f /etc/nftables-lab-isolation.conf
  changed_when: false

- name: List active lab_isolation forward chain
  ansible.builtin.command: nft list chain inet lab_isolation forward
  register: nft_chain_output
  changed_when: false

- name: Show active isolation rules
  ansible.builtin.debug:
    msg: "{{ nft_chain_output.stdout_lines }}"
