apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-platform-api
spec:
  # No replicas here on purpose: the HorizontalPodAutoscaler below owns the
  # replica count. Setting it would make Argo CD (selfHeal) keep resetting it to
  # this value and fight the HPA. On first create the Deployment starts at 1 and
  # the HPA immediately scales it to minReplicas.
  selector:
    matchLabels:
      app.kubernetes.io/name: lab-platform-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lab-platform-api
        app.kubernetes.io/part-of: lab-platform
    spec:
      serviceAccountName: lab-platform-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: LAB_PLATFORM
              value: kubernetes
            - name: STUDENT_IMAGE
              value: "{{ .Values.image.studentSandbox.repository }}:{{ .Values.image.studentSandbox.tag }}"
            - name: STUDENT_NAMESPACE
              value: {{ .Values.namespaces.students }}
            - name: PUBLIC_URL
              value: "https://{{ .Values.hostname }}/guacamole"
            - name: CLASS_TTL_SECONDS
              value: "{{ .Values.ttl.classSeconds }}"
            - name: HOMEWORK_TTL_SECONDS
              value: "{{ .Values.ttl.homeworkSeconds }}"
            - name: STUDENT_MEMORY_LIMIT
              value: "{{ .Values.student.memoryLimit }}"
            - name: STUDENT_CPU_REQUEST
              value: "{{ .Values.student.cpuRequest }}"
            - name: STUDENT_CPU_LIMIT
              value: "{{ .Values.student.cpuLimit }}"
            - name: JSON_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lab-platform-json-secret
                  key: json-secret-key
            - name: PGHOST
              value: lab-platform-db-pooler
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: lab-platform-db-app
                  key: dbname
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: lab-platform-db-app
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: lab-platform-db-app
                  key: password
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: lab-platform-api
spec:
  selector:
    app.kubernetes.io/name: lab-platform-api
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lab-platform-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lab-platform-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage }}
