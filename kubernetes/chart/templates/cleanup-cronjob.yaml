# Replaces the original in-process 60s polling thread, which would otherwise
# run once per API replica and race on the same session rows. A CronJob runs
# exactly once per tick regardless of how many api replicas are scaled to.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: lab-platform-cleanup
spec:
  schedule: "{{ .Values.cleanup.schedule }}"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            app.kubernetes.io/name: lab-platform-cleanup
        spec:
          serviceAccountName: lab-platform-api
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: cleanup
              image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
              command: ["python", "cleanup_once.py"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: LAB_PLATFORM
                  value: kubernetes
                - name: STUDENT_NAMESPACE
                  value: {{ .Values.namespaces.students }}
                - name: PGHOST
                  value: lab-platform-db-pooler
                - name: PGPORT
                  value: "5432"
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: lab-platform-db-app
                      key: dbname
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: lab-platform-db-app
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: lab-platform-db-app
                      key: password
