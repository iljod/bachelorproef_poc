apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab-platform-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab-platform-bootstrap
---
# Grants the provisioning API create/delete rights over student sandbox
# Pods/Services, scoped only to the lab-students namespace. No verbs that
# would allow mutating an existing Pod in place (redeploy is delete+create).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lab-platform-api-students
  namespace: {{ .Values.namespaces.students }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "create", "delete"]
  # get_container_status() reads the pod status subresource, which RBAC treats
  # as a separate resource from "pods"; read-only, used for the status poll.
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lab-platform-api-students
  namespace: {{ .Values.namespaces.students }}
subjects:
  - kind: ServiceAccount
    name: lab-platform-api
    namespace: {{ .Values.namespaces.platform }}
roleRef:
  kind: Role
  name: lab-platform-api-students
  apiGroup: rbac.authorization.k8s.io
---
# Lets the one-shot bootstrap Job create the JSON-auth and Guacamole admin
# break-glass Secrets exactly once, and check for their existence on re-runs.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lab-platform-bootstrap
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lab-platform-bootstrap
subjects:
  - kind: ServiceAccount
    name: lab-platform-bootstrap
roleRef:
  kind: Role
  name: lab-platform-bootstrap
  apiGroup: rbac.authorization.k8s.io
