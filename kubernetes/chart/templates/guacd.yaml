apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacd
spec:
  replicas: {{ .Values.guacd.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: guacd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guacd
        app.kubernetes.io/part-of: lab-platform
    spec:
      # Generous grace period: guacd holds long-lived per-session tunnels, so a
      # scale-down or rollout should let in-flight student sessions drain
      # instead of cutting them mid-use.
      terminationGracePeriodSeconds: {{ .Values.guacd.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: guacd
          image: "{{ .Values.image.guacd.repository }}:{{ .Values.image.guacd.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: guacd
              containerPort: 4822
          resources:
            {{- toYaml .Values.guacd.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: guacd
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: guacd
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: guacd
spec:
  selector:
    app.kubernetes.io/name: guacd
  ports:
    - name: guacd
      port: 4822
      targetPort: guacd
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: guacd
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: guacd
  minReplicas: {{ .Values.guacd.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.guacd.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.guacd.autoscaling.targetCPUUtilizationPercentage }}
