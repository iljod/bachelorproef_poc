apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacamole
spec:
  replicas: {{ .Values.guacamole.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: guacamole
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guacamole
        app.kubernetes.io/part-of: lab-platform
    spec:
      securityContext:
        runAsNonRoot: true
        # The image declares `USER guacamole` (a name); the kubelet cannot map a
        # name to a UID at admission and so cannot verify it is non-root. Pin the
        # numeric uid/gid baked into the image (guacamole:x:1001:1001) so the
        # runAsNonRoot check passes.
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: guacamole
          image: "{{ .Values.image.guacamole.repository }}:{{ .Values.image.guacamole.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: GUACD_HOSTNAME
              value: guacd
            - name: GUACD_PORT
              value: "4822"
            - name: POSTGRESQL_HOSTNAME
              value: lab-platform-db-pooler
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: lab-platform-db-app
                  key: dbname
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: lab-platform-db-app
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lab-platform-db-app
                  key: password
            # Presence of any JSON_-prefixed variable auto-enables the
            # bundled guacamole-auth-json extension (apache/guacamole-client
            # guacamole-docker/build.d/010-map-guacamole-extensions.sh); the
            # extension reads "json-secret-key" via Guacamole's own
            # enable-environment-properties fallback, so no properties file
            # or custom image is needed.
            - name: JSON_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lab-platform-json-secret
                  key: json-secret-key
          resources:
            {{- toYaml .Values.guacamole.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /guacamole/
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /guacamole/
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: guacamole
  annotations:
    # Guacamole keeps auth tokens (and in-flight tunnels) in per-pod memory, not
    # a shared store, so a client must stay on the pod that minted its token.
    # Traefik's Kubernetes Ingress load-balances across the pod endpoints
    # directly and bypasses the ClusterIP, so the Service-level sessionAffinity
    # below has no effect on ingress traffic. Pin the client at the Traefik
    # layer with a sticky cookie; without it a token minted on one replica
    # gets PERMISSION_DENIED on the ~half of requests routed to the other.
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: "lab-guac-affinity"
    traefik.ingress.kubernetes.io/service.sticky.cookie.secure: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.httponly: "true"
spec:
  # Kept as a fallback for any non-Traefik (direct ClusterIP) access; ingress
  # stickiness is handled by the Traefik cookie annotations above.
  sessionAffinity: ClientIP
  selector:
    app.kubernetes.io/name: guacamole
  ports:
    - name: http
      port: 8080
      targetPort: http
